# Railway deployment configuration (Nixpacks)
# https://nixpacks.com/docs/configuration/file

# Let Nixpacks auto-detect PHP 8.4 from composer.json
# and handle extensions via composer.json "require" section.

# Set NIXPACKS_PHP_ROOT_DIR=/app/public in Railway env vars
# so Nginx serves from Laravel's public/ directory.

[phases.build]
cmds = [
    "npm run build",
    "php artisan view:cache",
    "php artisan route:cache"
]

[start]
cmd = "bash /app/start.sh"
