# Railway deployment configuration (Nixpacks)
# https://nixpacks.com/docs/configuration/file

# PHP 8.4 is auto-detected from composer.json.
# NIXPACKS_PHP_ROOT_DIR=/app/public is auto-set for Laravel apps.
# Nginx + PHP-FPM start command is auto-configured.

[phases.build]
cmds = [
    "npm run build",
    "php artisan view:cache",
    "php artisan route:cache"
]
